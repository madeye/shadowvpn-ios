language = "C"
include_guard = "SHADOWVPN_CORE_H"
pragma_once = true
header = "// Generated by cbindgen — do not edit by hand."
autogen_warning = "/* Regenerate with `cbindgen --config cbindgen.toml --output include/shadowvpn_core.h` */"
style = "both"
line_length = 100
tab_width = 4
documentation = true
no_includes = false

[export]
prefix = ""

[parse]
parse_deps = false

[enum]
prefix_with_name = true
